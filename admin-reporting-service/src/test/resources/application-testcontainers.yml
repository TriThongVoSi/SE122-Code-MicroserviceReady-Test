server:
  port: 8091

spring:
  application:
    name: admin-reporting-service-test

  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
    show-sql: false

  flyway:
    enabled: false

  h2:
    console:
      enabled: false

jwt:
  jwks-uri: http://localhost:8081/api/v1/auth/.well-known/jwks.json

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always

admin-reporting:
  backfill:
    enabled: false
