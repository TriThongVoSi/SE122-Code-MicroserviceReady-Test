server:
  port: ${GATEWAY_PORT:8000}

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
            allowed-methods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowed-headers: "*"
            allow-credentials: true
            max-age: 3600
      routes:
        - id: identity-route
          uri: ${IDENTITY_SERVICE_URI:http://localhost:8081}
          predicates:
            - Path=/api/v1/auth/**, /api/v1/user/**, /api/v1/preferences/**
        - id: monolith-route
          uri: ${MONOLITH_URI:http://localhost:8080}
          predicates:
            - Path=/api/v1/**, /v3/api-docs/**, /swagger-ui/**, /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      show-details: always

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    org.springframework.web.reactive.function.client.ExchangeFunctions: DEBUG
    org.example.apigateway: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - [CorrelationID: %X{correlationId}] - %msg%n"
