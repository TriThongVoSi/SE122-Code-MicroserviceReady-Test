# Test profile configuration for identity-service
# Uses H2 in-memory database for fast, isolated testing

# H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.hbm2ddl.delimiter=;

# Disable Flyway for H2 tests (we use create-drop)
spring.flyway.enabled=false

# JWT Configuration (test values)
jwt.rsa.private-key-location=classpath:test-keys/rsa-private.pem
jwt.rsa.public-key-location=classpath:test-keys/rsa-public.pem
jwt.valid-duration=3600
jwt.refreshable-duration=36000

# Disable external services for tests
app.mail.enabled=false
spring.mail.host=localhost
spring.mail.port=1025

# Disable dev bootstrap for tests
app.dev.bootstrap.admin.enabled=false
dev.bootstrap-admin.enabled=false
